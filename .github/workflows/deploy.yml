name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: |
          npm run build 2>&1 | tee build.log
          EXIT=$?
          echo "--- Full build log ---"
          cat build.log
          exit $EXIT
        env:
          BASE_PATH: ""
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Fix paths for GitHub Pages subpath
        run: |
          REPO_PATH="/saurabh_portfolio"
          if [ -d out ]; then
            find out -name "*.html" -exec sed -i "s|href=\"/_next/|href=\"${REPO_PATH}/_next/|g" {} \;
            find out -name "*.html" -exec sed -i "s|src=\"/_next/|src=\"${REPO_PATH}/_next/|g" {} \;
            find out -name "*.html" -exec sed -i "s|href=\"/resume|href=\"${REPO_PATH}/resume|g" {} \;
          fi

      - name: Debug if no out
        if: failure()
        run: |
          echo "--- Working directory contents ---"
          ls -la
          echo "--- .next if present ---"
          ls -la .next 2>/dev/null || true
          echo "--- build.log tail (last 100 lines) ---"
          tail -100 build.log 2>/dev/null || true

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 5

      - name: Verify out directory
        run: |
          if [ ! -d out ]; then echo "::error::out directory missing after build"; exit 1; fi
          ls -la out
          find out -name "index.html" | head -5

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
