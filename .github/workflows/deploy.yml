name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: |
          npm run build 2>&1 | tee build.log
          EXIT=$?
          echo "--- Full build log ---"
          cat build.log
          exit $EXIT
        env:
          BASE_PATH: /${{ github.event.repository.name }}
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Debug if no out
        if: failure()
        run: |
          echo "--- Working directory contents ---"
          ls -la
          echo "--- .next if present ---"
          ls -la .next 2>/dev/null || true
          echo "--- build.log tail (last 100 lines) ---"
          tail -100 build.log 2>/dev/null || true

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: build.log
          retention-days: 5

      - name: Verify out directory
        run: |
          if [ ! -d out ]; then echo "::error::out directory missing after build"; exit 1; fi
          ls -la out
          find out -name "index.html" | head -5

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          static_site_generator: next
          token: ${{ secrets.PAGES_DEPLOY_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_DEPLOY_TOKEN != '' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
